name: release

# Build the `pipa` CLI and `pipa-server` for every supported target and
# attach them to the GitHub Release for the pushed tag. The install script
# (served at guisso.dev/pipa/install.sh) pulls these assets.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Kill a hung job quickly instead of letting it burn to the 24h ceiling
    # (which is what cancelled the previous release runs).
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # x86_64-apple-darwin (Intel mac) removed for now — the free runners
          # are Apple Silicon and the cross build to Intel was the job that hung.
          - target: aarch64-apple-darwin
            os: macos-15
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build & stage assets
        shell: bash
        run: |
          set -eu
          target="${{ matrix.target }}"
          if [ "${{ matrix.cross }}" = "true" ]; then build="cross"; else build="cargo"; fi
          ext=""
          if [ "$target" = "x86_64-pc-windows-msvc" ]; then ext=".exe"; fi
          mkdir -p dist

          # 1) Minimal build — CLI + server with NO feature flags: the simplest
          #    functional server (single-owner-friendly, most portable). This is
          #    the `pipa-server-<target>` asset and the `pipa-<target>` CLI that
          #    install.sh pulls.
          $build build --release --target "$target" -p pipa-cli -p pipa-server
          cp "target/$target/release/pipa${ext}"        "dist/pipa-${target}${ext}"
          cp "target/$target/release/pipa-server${ext}" "dist/pipa-server-${target}${ext}"

          # 2) Full server — every feature flag on (zone + thumbnails). Rebuilds
          #    pipa-server to the same path, so copy it out under a -full name.
          $build build --release --target "$target" -p pipa-server \
            --features pipa-server/zone,pipa-server/thumbnails
          cp "target/$target/release/pipa-server${ext}" "dist/pipa-server-full-${target}${ext}"

          ls -la dist

      - name: Upload to release
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          files: dist/*
          fail_on_unmatched_files: true
