<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>code expired — pages</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0f1115; color: #e6e6e6; }
      main { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { width: 100%; max-width: 420px; background: #161922;
        border: 1px solid #262a36; border-radius: 12px; padding: 1.5rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35); text-align: center; }
      .x { color: #ff7676; font-size: 1.5rem; }
      h1 { margin: 0.5rem 0; font-size: 1.1rem; font-weight: 600; }
      p { margin: 0; color: #9aa3b2; font-size: 0.9rem; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="x">⏱</div>
        <h1>confirmation expired</h1>
        <p>this code is no longer valid. return to your terminal and re-run the command to start a new confirmation.</p>
      </div>
    </main>
  </body>
</html>
