<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>approve device — gapes</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0f1115; color: #e6e6e6; }
      main { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { width: 100%; max-width: 420px; background: #161922;
        border: 1px solid #262a36; border-radius: 12px; padding: 1.5rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
      h1 { margin: 0 0 0.5rem; font-size: 1.1rem; font-weight: 600; }
      p  { margin: 0 0 1.25rem; color: #9aa3b2; font-size: 0.9rem; line-height: 1.5; }
      label { display: block; font-size: 0.78rem; color: #9aa3b2;
        margin: 0.75rem 0 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
      input[type=text] { width: 100%; box-sizing: border-box;
        padding: 0.6rem 0.75rem; background: #0f1218; color: #e6e6e6;
        border: 1px solid #2a2f3d; border-radius: 8px; font-size: 0.95rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.05em; }
      input[type=text]:focus { outline: none; border-color: #4a73ff; }
      .code-display { display: block; padding: 0.7rem 0.85rem;
        background: #0f1218; color: #c9d0db;
        border: 1px solid #2a2f3d; border-radius: 8px;
        font-size: 1.05rem; font-weight: 600;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.1em; text-align: center; }
      button { width: 100%; margin-top: 1.25rem; padding: 0.65rem 0.75rem;
        background: #4a73ff; color: white; border: 0; border-radius: 8px;
        font-size: 0.95rem; font-weight: 600; cursor: pointer; }
      button:hover { background: #3a63ef; }
      .hint { color: #777f8c; font-size: 0.78rem; margin-top: 0.85rem; }
      .err { margin-top: 0.85rem; color: #ff7676; font-size: 0.85rem; }
      .pill { display: inline-block; padding: 0.15rem 0.55rem;
        background: #1f2330; color: #c9d0db; font-size: 0.72rem;
        border-radius: 999px; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
      .gpa-brand-svg { display: block; margin: 0 auto 1.25rem; height: 2.25rem; width: auto; color: #e6e6e6; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap">
    <link rel="icon" type="image/svg+xml" href="/admin/assets/favicon.svg" />
  </head>
  <body>
    <main>
      <form class="card" method="post" action="/cli">
        {% include "partials/brand.html" %}
        <div class="pill">owner · approve cli</div>
        <h1>approve this device</h1>
        <p>
          your CLI is asking to log in. confirm the pairing code matches what
          your terminal shows, then click approve.
        </p>

        <label>pairing code</label>
        <div class="code-display">{{ device_code }}</div>
        <input type="hidden" name="device_code" value="{{ device_code }}" />

        <label for="label">device label</label>
        <input type="text" id="label" name="label"
               value="{{ prefill_label }}"
               placeholder="e.g. Fernando's MacBook" required />

        <input type="hidden" name="scope" value="{{ scope }}" />

        <button type="submit">approve</button>

        {% if let Some(e) = error %}
          <div class="err">{{ e }}</div>
        {% endif %}

        <div class="hint">scope: <strong>{{ scope }}</strong></div>
      </form>
    </main>
  </body>
</html>
