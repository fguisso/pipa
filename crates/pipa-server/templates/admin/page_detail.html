{% extends "admin/base.html" %}

{% block title %}page {{ uuid_short }} — admin{% endblock %}

{% block content %}
  <section x-data="pageDetail()" x-init="hydrate()" class="gpa-stack">
    <a href="{{ ui_path }}" class="gpa-link">← back to pages</a>

    <h1>page <span class="gpa-mono">{{ uuid }}</span></h1>

    <div x-show="error" class="gpa-error" x-text="error"></div>
    <div x-show="!page" class="gpa-muted">loading…</div>

    <template x-if="page">
      <div class="gpa-stack">
        <div class="gpa-row gpa-row--wrap">
          <div class="gpa-stat"><span class="gpa-stat-k">name</span><span x-text="page.name || '—'"></span></div>
          <div class="gpa-stat"><span class="gpa-stat-k">mode</span><span x-text="page.mode"></span></div>
          <div class="gpa-stat"><span class="gpa-stat-k">visibility</span>
            <span class="gpa-pill" :class="'gpa-pill--' + page.visibility" x-text="page.visibility"></span>
          </div>
          <div class="gpa-stat"><span class="gpa-stat-k">size</span><span x-text="gpa.fmtBytes(page.size_bytes)"></span></div>
          <div class="gpa-stat"><span class="gpa-stat-k">files</span><span x-text="page.file_count"></span></div>
          <div class="gpa-stat"><span class="gpa-stat-k">updated</span><span x-text="gpa.fmtTime(page.updated_at)"></span></div>
        </div>

        <section class="gpa-card">
          <h2>visibility</h2>
          <p class="gpa-muted">
            switch to <strong>private</strong> or <strong>password</strong> directly.
            making a page <strong>public</strong> is destructive — use the CLI:
          </p>
          <div class="gpa-codecopy">
            <code x-text="'pipa share ' + page.uuid + ' --public'"></code>
            <button @click="copy('pipa share ' + page.uuid + ' --public')" class="gpa-btn gpa-btn--ghost">copy</button>
          </div>
          <div class="gpa-row gpa-row--wrap" style="margin-top:0.85rem">
            <button class="gpa-btn" @click="setVisibility('private')"
                    :disabled="busy || page.visibility === 'private'">make private</button>
            <button class="gpa-btn" @click="promptPassword()" :disabled="busy">
              set password
            </button>
          </div>
        </section>

        <section class="gpa-card">
          <h2>comments</h2>
          <label class="gpa-checkbox">
            <input type="checkbox" :checked="page.comments_enabled" @change="toggleComments($event.target.checked, page.comments_require_approval)" />
            comments enabled
          </label>
          <label class="gpa-checkbox" :class="{ 'gpa-disabled': !page.comments_enabled }">
            <input type="checkbox" :checked="page.comments_require_approval"
                   :disabled="!page.comments_enabled"
                   @change="toggleComments(page.comments_enabled, $event.target.checked)" />
            require approval before publishing
          </label>

          <template x-if="page.comments_enabled">
            <div class="gpa-callout">
              <strong>heads up — we modify your HTML on the fly.</strong>
              while comments are on, every HTML response for this page is
              served with a <code>&lt;script&gt;</code> tag injected right
              before <code>&lt;/body&gt;</code> that loads the comments
              widget. your deployed files on disk are <em>not</em> touched —
              flip this checkbox off and the next request gets the original
              HTML back, byte for byte.
            </div>
          </template>

          <h3>moderation queue</h3>
          <div x-show="commentsLoading" class="gpa-muted">loading comments…</div>
          <p x-show="!commentsLoading && comments.length === 0" class="gpa-muted">
            no comments yet.
          </p>
          <table class="gpa-table" x-show="comments.length > 0">
            <thead>
              <tr>
                <th>when</th>
                <th>status</th>
                <th>author</th>
                <th>body</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="c in comments" :key="c.id">
                <tr>
                  <td x-text="gpa.fmtTime(c.ts)"></td>
                  <td>
                    <span class="gpa-pill" :class="'gpa-pill--c-' + c.status" x-text="c.status"></span>
                  </td>
                  <td x-text="c.author"></td>
                  <td class="gpa-cell-md" x-text="c.body_md"></td>
                  <td>
                    <button class="gpa-btn gpa-btn--xs" @click="setStatus(c.id, 'visible')"
                            :disabled="busy || c.status === 'visible'">approve</button>
                    <button class="gpa-btn gpa-btn--xs" @click="setStatus(c.id, 'hidden')"
                            :disabled="busy || c.status === 'hidden'">hide</button>
                    <button class="gpa-btn gpa-btn--xs gpa-btn--danger" @click="deleteComment(c.id)" :disabled="busy">delete</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </section>

        <section class="gpa-card">
          <h2>archive</h2>
          <p class="gpa-muted">
            archiving 404s the public URL but keeps every file on disk —
            unarchive later to put it back online with the same uuid.
          </p>
          <div class="gpa-row" style="margin-top:0.5rem">
            <template x-if="!page.archived">
              <button class="gpa-btn" @click="toggleArchive(true)" :disabled="busy">
                archive
              </button>
            </template>
            <template x-if="page.archived">
              <button class="gpa-btn" @click="toggleArchive(false)" :disabled="busy">
                unarchive
              </button>
            </template>
            <template x-if="page.archived">
              <span class="gpa-pill gpa-pill--archived">archived</span>
            </template>
          </div>
        </section>

        <section class="gpa-card gpa-card--danger">
          <h2>delete page</h2>
          <p class="gpa-muted">
            permanently removes every file from disk, drops stats + comments.
            no undo. prefer <strong>archive</strong> above if there's any
            chance you'll want this back.
          </p>
          <button class="gpa-btn gpa-btn--danger" @click="deleteOpen = true" :disabled="busy">
            delete this page…
          </button>
        </section>
      </div>
    </template>

    <!-- Delete confirm modal — mirrors the dashboard wording. -->
    <template x-if="deleteOpen && page">
      <div class="gpa-modal-overlay" @click.self="deleteOpen = false">
        <div class="gpa-modal gpa-modal--danger" role="dialog" aria-modal="true">
          <h3>delete <strong x-text="page.name || 'this page'"></strong>?</h3>
          <p>
            this wipes every file, view stat, and comment for the page.
            <strong>you can't undo it.</strong>
          </p>
          <p>
            not sure? <strong>archive</strong> takes it offline (visitors
            see "not found") but keeps the files — you can republish in one
            click later.
          </p>
          <code class="gpa-mono" x-text="page.uuid"></code>
          <div class="gpa-row">
            <button class="gpa-btn gpa-btn--ghost" @click="deleteOpen = false" :disabled="busy">cancel</button>
            <button class="gpa-btn"
                    @click="toggleArchive(true); deleteOpen = false"
                    :disabled="busy || page.archived">
              archive instead
            </button>
            <button class="gpa-btn gpa-btn--danger" @click="confirmDelete()" :disabled="busy">
              yes, delete forever
            </button>
          </div>
        </div>
      </div>
    </template>
  </section>
{% endblock %}

{% block scripts %}
<script>
  window.__PIPA_ADMIN_TOKENS = {{ tokens_json|safe }};
  window.__PIPA_PAGE_UUID = {{ uuid_json|safe }};
  window.__PIPA_UI_PATH = {{ ui_path_json|safe }};
</script>
<script src="{{ ui_path }}/assets/admin.js"></script>
<script>
  function pageDetail() {
    return {
      page: null,
      comments: [],
      commentsLoading: false,
      busy: false,
      deleteOpen: false,
      error: '',
      gpa: window.gpa,
      async hydrate() {
        try {
          this.page = await gpa.apiGet('/api/pages/' + window.__PIPA_PAGE_UUID, 'read');
          await this.loadComments();
        } catch (e) { this.error = String(e); }
      },
      async loadComments() {
        this.commentsLoading = true;
        try {
          const r = await gpa.apiGet('/api/pages/' + window.__PIPA_PAGE_UUID + '/comments/moderation', 'admin');
          this.comments = r.comments || [];
        } catch (e) { /* no comments enabled etc. */ this.comments = []; }
        finally { this.commentsLoading = false; }
      },
      async setVisibility(v) {
        this.busy = true; this.error = '';
        try {
          this.page = await gpa.apiJson('/api/pages/' + this.page.uuid + '/visibility', 'POST', { visibility: v }, 'admin');
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async promptPassword() {
        const pw = window.prompt('new password (min 8 chars):');
        if (!pw) return;
        this.busy = true; this.error = '';
        try {
          this.page = await gpa.apiJson('/api/pages/' + this.page.uuid + '/visibility', 'POST',
            { visibility: 'password', password: pw }, 'admin');
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async toggleComments(enabled, requireApproval) {
        this.busy = true; this.error = '';
        try {
          const r = await gpa.apiJson('/api/pages/' + this.page.uuid + '/comments-config', 'POST',
            { enabled, require_approval: requireApproval }, 'admin');
          this.page = r.page;
          await this.loadComments();
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async setStatus(id, status) {
        this.busy = true; this.error = '';
        try {
          const updated = await gpa.apiJson('/api/comments/' + id, 'PATCH', { status }, 'admin');
          this.comments = this.comments.map(c => c.id === id ? { ...c, ...updated } : c);
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async deleteComment(id) {
        if (!window.confirm('delete this comment?')) return;
        this.busy = true; this.error = '';
        try {
          await gpa.apiJson('/api/comments/' + id, 'DELETE', null, 'admin');
          this.comments = this.comments.filter(c => c.id !== id);
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async toggleArchive(archived) {
        this.busy = true; this.error = '';
        try {
          const updated = await gpa.apiJson(
            '/api/admin/pages/' + this.page.uuid + '/archive',
            'POST', { archived }
          );
          this.page = updated || { ...this.page, archived };
        } catch (e) { this.error = String(e); }
        finally { this.busy = false; }
      },
      async confirmDelete() {
        const uuid = this.page.uuid;
        this.busy = true; this.error = '';
        try {
          await gpa.apiJson('/api/admin/pages/' + uuid, 'DELETE', null);
          this.deleteOpen = false;
          // Bounce back to the dashboard so the row disappears.
          window.location = window.__PIPA_UI_PATH || '/admin';
        } catch (e) { this.error = String(e); this.busy = false; }
      },
      copy(text) {
        navigator.clipboard?.writeText(text);
      }
    };
  }
</script>
{% endblock %}
