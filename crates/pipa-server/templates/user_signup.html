<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sign up — pipa</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #0f1115; color: #e6e6e6; }
      main { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { width: 100%; max-width: 460px; background: #161922;
        border: 1px solid #262a36; border-radius: 12px; padding: 1.75rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
      h1 { margin: 0 0 0.5rem; font-size: 1.15rem; font-weight: 600; }
      p  { margin: 0 0 1.25rem; color: #9aa3b2; font-size: 0.9rem; line-height: 1.55; }
      label { display: block; font-size: 0.78rem; color: #9aa3b2;
        margin: 0.75rem 0 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
      input { width: 100%; box-sizing: border-box;
        padding: 0.6rem 0.75rem; background: #0f1218; color: #e6e6e6;
        border: 1px solid #2a2f3d; border-radius: 8px; font-size: 0.95rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      input:focus { outline: none; border-color: #4a73ff; }
      button { width: 100%; margin-top: 1.25rem; padding: 0.7rem 0.75rem;
        background: #4a73ff; color: white; border: 0; border-radius: 8px;
        font-size: 0.95rem; font-weight: 600; cursor: pointer; }
      button:hover { background: #3a63ef; }
      .err { margin-top: 0.85rem; color: #ff7676; font-size: 0.85rem; }
      .hint { color: #777f8c; font-size: 0.78rem; margin-top: 0.9rem; line-height: 1.5; }
      a { color: #7aa2ff; }
    </style>
    <link rel="icon" type="image/svg+xml" href="/admin/assets/favicon.svg" />
  </head>
  <body>
    <main>
      <form class="card" method="post" action="/signup" autocomplete="off">
        <h1>create your account</h1>
        <p>pick a username and password. you'll use these to sign in and to
           approve <code>pipa login</code> from your CLI.</p>

        <label for="username">username</label>
        <input type="text" id="username" name="username" value="{{ prefill_username }}"
               autocapitalize="none" autocomplete="username" required minlength="2" />

        <label for="password">password</label>
        <input type="password" id="password" name="password"
               autocomplete="new-password" required minlength="8" />

        <label for="password_confirm">confirm password</label>
        <input type="password" id="password_confirm" name="password_confirm"
               autocomplete="new-password" required minlength="8" />

        {% if let Some(n) = next %}<input type="hidden" name="next" value="{{ n }}" />{% endif %}

        <button type="submit">sign up</button>

        {% if let Some(e) = error %}<div class="err">{{ e }}</div>{% endif %}

        <div class="hint">already have an account? <a href="/login">sign in</a>.</div>
      </form>
    </main>
  </body>
</html>
