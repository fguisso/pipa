<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>device approved — pipa</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0f1115; color: #e6e6e6; }
      main { min-height: 100%; display: grid; place-items: center; padding: 2rem; }
      .card { width: 100%; max-width: 420px; background: #161922;
        border: 1px solid #262a36; border-radius: 12px; padding: 1.5rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35); text-align: center; }
      .ok { color: #4ade80; font-size: 1.5rem; }
      h1 { margin: 0.5rem 0; font-size: 1.1rem; font-weight: 600; }
      p { margin: 0; color: #9aa3b2; font-size: 0.9rem; line-height: 1.5; }
      .label { margin-top: 0.85rem; color: #c9d0db;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .gpa-brand-svg { display: block; margin: 0 auto 1rem; height: 1.85rem; width: auto; color: #e6e6e6; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap">
    <link rel="icon" type="image/svg+xml" href="/admin/assets/favicon.svg" />
  </head>
  <body>
    <main>
      <div class="card">
        {% include "partials/brand.html" %}
        <div class="ok">✓</div>
        <h1>device registered</h1>
        <p>return to your terminal — the CLI should pick up the session within a few seconds.</p>
        <div class="label">{{ label }}</div>
      </div>
    </main>
  </body>
</html>
