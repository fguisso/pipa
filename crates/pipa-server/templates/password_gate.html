<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>password required</title>
    <!-- Same-origin stylesheet so the strict gate CSP (`default-src 'self'`)
         allows it; inline CSS would be blocked by that policy. -->
    <link rel="stylesheet" href="/__gate.css" />
  </head>
  <body>
    <main>
      <form class="card" method="post" action="{{ post_action }}">
        <h1>this page is password-protected</h1>
        <p>enter the password to continue.</p>
        <label for="password">password</label>
        <input type="password" id="password" name="password" autofocus required />
        <input type="hidden" name="next" value="{{ next_path }}" />
        <button type="submit">unlock</button>
        {% if error %}
          <div class="err">incorrect password</div>
        {% endif %}
      </form>
    </main>
  </body>
</html>
