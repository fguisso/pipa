{% extends "admin/base.html" %}

{% block title %}sign in — admin{% endblock %}

{% block content %}
  <section class="gpa-card gpa-card--narrow">
    <h1>sign in</h1>
    <p class="gpa-muted">
      sign in with the admin credentials you created at first boot.
    </p>
    <form method="post" action="{{ ui_path }}/login" class="gpa-form" autocomplete="off">
      <label for="username">username</label>
      <input type="text" id="username" name="username"
             value="{{ prefill_username }}"
             autocomplete="username" autocapitalize="none" required />

      <label for="password">password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required />

      <button type="submit">sign in</button>
      {% if let Some(e) = error %}
        <div class="gpa-error">{{ e }}</div>
      {% endif %}
    </form>
  </section>
{% endblock %}
